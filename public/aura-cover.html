<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aura cover</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#fff;display:flex;justify-content:center;}

  .cover{width:100%;max-width:1296px;aspect-ratio:1296/1017;}
  .panel{width:100%;height:100%;background:#f0e9f8;border-radius:16px;padding:0 6%;
    display:flex;align-items:center;gap:4%;overflow:hidden;}

  .atext{flex:1;}
  .wordmark{font-size:1.9vw;font-weight:600;letter-spacing:0.5em;color:#1c1c1c;margin-bottom:3.5%;
    padding-left:.4em;}
  h1{font-family:Georgia,'Times New Roman',serif;font-weight:700;font-size:3.5vw;line-height:1.08;
    color:#232323;letter-spacing:-.5px;margin-bottom:4.5%;}
  .sub{font-size:1.5vw;line-height:1.5;color:#5a5a5a;max-width:24ch;margin-bottom:6%;}
  .flow{display:flex;gap:1.4%;flex-wrap:wrap;}
  .flow .p{background:#fff;color:#6a4a9a;border-radius:999px;padding:1.4% 3%;
    font-size:1.3vw;font-weight:700;white-space:nowrap;box-shadow:0 .6vw 1.2vw -.6vw rgba(90,50,140,0.25);}

  /* phone mockup with the real screen */
  .aphone{flex:0 0 37%;display:flex;align-items:center;justify-content:center;}
  .phone{width:100%;max-width:24vw;aspect-ratio:1/2.02;border-radius:2.4vw;
    border:0.7vw solid #16171a;background:#000;overflow:hidden;
    box-shadow:0 4vw 6vw -3vw rgba(30,20,50,0.45);}
  .phone img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
</style>
</head>
<body>
  <div class="cover">
    <div class="panel">
      <div class="atext">
        <div class="wordmark">AURA</div>
        <h1>Gifting, rebuilt around how people actually shop.</h1>
        <p class="sub">A florist app where you browse, customize your own bouquet, and check out — the full flow, research to ship.</p>
        <div class="flow">
          <span class="p">Browse</span><span class="p">Customize</span><span class="p">Checkout</span>
        </div>
      </div>
      <div class="aphone">
        <div class="phone"><img src="/projects/aura/aura-dashboard.png" alt="Aura app"></div>
      </div>
    </div>
  </div>
</body>
</html>
