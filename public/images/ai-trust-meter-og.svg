<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#d4d7e2"/>
    </pattern>
    <radialGradient id="fade" cx="88%" cy="6%" r="62%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="dotmask"><rect width="1200" height="630" fill="url(#fade)"/></mask>
    <style>
      @keyframes chipcycle {
        0% { opacity:.38 } 4% { opacity:1 } 29% { opacity:1 } 34% { opacity:.38 } 100% { opacity:.38 }
      }
      @keyframes litcycle {
        0% { opacity:0 } 4% { opacity:1 } 29% { opacity:1 } 34% { opacity:0 } 100% { opacity:0 }
      }
      .chip { opacity:.38; animation: chipcycle 9s infinite ease-in-out; }
      .lit  { opacity:0;  animation: litcycle 9s infinite ease-in-out; }
      .stance { opacity:0; animation: litcycle 9s infinite ease-in-out; }
      .d0 { animation-delay: 0s }
      .d1 { animation-delay: 3s }
      .d2 { animation-delay: 6s }
      @media (prefers-reduced-motion: reduce) {
        .chip { opacity:1; animation:none }
        .lit { animation:none }
        .lit.d0 { opacity:1 }
        .stance { animation:none }
        .stance.d0 { opacity:1 }
      }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#fbfbfd"/>
  <rect width="1200" height="630" fill="url(#dots)" mask="url(#dotmask)" opacity=".7"/>

  <!-- eyebrow -->
  <circle cx="84" cy="91" r="5" fill="#5b5bd6"/>
  <text x="100" y="97" font-size="15" font-weight="600" letter-spacing="2" fill="#4444c4">CONCEPT STUDY · AI TRUST UX</text>

  <!-- title -->
  <text x="79" y="208" font-size="82" font-weight="700" letter-spacing="-2.4" fill="#15151c">The AI Trust Meter</text>

  <!-- stance line, cross-fades per state -->
  <g>
    <text class="stance d0" x="80" y="262" font-size="26" font-weight="500" fill="#15623f">Grounded: cite the source, reply without fear.</text>
    <text class="stance d1" x="80" y="262" font-size="26" font-weight="500" fill="#8a5500">Inferred: flag the guess before it reaches the customer.</text>
    <text class="stance d2" x="80" y="262" font-size="26" font-weight="500" fill="#475160">Uncertain: route to a human, don&apos;t invent.</text>
  </g>

  <!-- trust meter -->
  <rect x="80" y="372" width="180" height="9" rx="4.5" fill="#e7e8ee"/>
  <rect x="272" y="372" width="180" height="9" rx="4.5" fill="#e7e8ee"/>
  <rect x="464" y="372" width="180" height="9" rx="4.5" fill="#e7e8ee"/>
  <rect class="lit d0" x="80" y="372" width="180" height="9" rx="4.5" fill="#1a7f52"/>
  <rect class="lit d1" x="272" y="372" width="180" height="9" rx="4.5" fill="#b06d00"/>
  <rect class="lit d2" x="464" y="372" width="180" height="9" rx="4.5" fill="#5b6472"/>

  <!-- chips -->
  <g class="chip d0">
    <rect x="80" y="408" width="186" height="50" rx="25" fill="#e8f5ee" stroke="#1a7f52" stroke-opacity=".28"/>
    <circle cx="109" cy="433" r="6" fill="#1a7f52"/>
    <text x="125" y="440" font-size="22" font-weight="600" fill="#15623f">Grounded</text>
  </g>
  <g class="chip d1">
    <rect x="282" y="408" width="172" height="50" rx="25" fill="#fdf3e3" stroke="#b06d00" stroke-opacity=".32"/>
    <circle cx="311" cy="433" r="6" fill="#b06d00"/>
    <text x="327" y="440" font-size="22" font-weight="600" fill="#8a5500">Inferred</text>
  </g>
  <g class="chip d2">
    <rect x="470" y="408" width="192" height="50" rx="25" fill="#f3f4f6" stroke="#5b6472" stroke-opacity=".32"/>
    <circle cx="499" cy="433" r="6" fill="#5b6472"/>
    <text x="515" y="440" font-size="22" font-weight="600" fill="#475160">Uncertain</text>
  </g>

  <!-- footer -->
  <text x="80" y="582" font-size="20" font-weight="500" fill="#5b6472">Designed &amp; built by <tspan font-weight="600" fill="#1a1a22">Sanjana Gangishetty</tspan></text>
  <text x="1120" y="582" font-size="19" font-weight="500" fill="#9aa1ad" text-anchor="end">gangishettysanjana.com</text>
</svg>
